<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="details-container">
        <h2 id="project-title" class="details-title">Loading...</h2>
        <p class="details-desc">Complete the tasks below to earn points.</p>
        
        <div class="task-list">
            <div class="task-item">
                <span>Daily Check-in</span>
                <button id="task_1" class="task-btn" onclick="completeTask('task_1')">Claim</button>
            </div>
            <div class="task-item">
                <span>Join Telegram Channel</span>
                <button id="task_2" class="task-btn" onclick="completeTask('task_2')">Verify</button>
            </div>
            <div class="task-item">
                <span>Retweet Post</span>
                <button id="task_3" class="task-btn" onclick="completeTask('task_3')">Do Task</button>
            </div>
        </div>
    </div>

    <script src="../util/app.js"></script>
</body>
</html>
