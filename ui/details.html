<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="details-container">
        <h2 id="project-title" class="details-title">Loading...</h2>
        <p class="details-desc">Complete the tasks below to earn XP points.</p>
        
        <div class="task-list">
            <div class="task-item">
                <span>Daily Check-in (+10 XP)</span>
                <button id="task_1" class="task-btn" onclick="executeTask('task_1', 'https://t.me/your_airdrop_bot_link', 10)">Claim</button>
            </div>
            <div class="task-item">
                <span>Join Telegram Channel (+50 XP)</span>
                <button id="task_2" class="task-btn" onclick="executeTask('task_2', 'https://t.me/telegram', 50)">Join</button>
            </div>
            <div class="task-item">
                <span>Follow on X (Twitter) (+30 XP)</span>
                <button id="task_3" class="task-btn" onclick="executeTask('task_3', 'https://twitter.com', 30)">Follow</button>
            </div>
        </div>
    </div>

    <script src="../util/app.js"></script>
</body>
</html>
