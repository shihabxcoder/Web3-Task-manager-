<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <header>
        <h1>Airdrop Tasks</h1>
    </header>

    <main>
        <div class="card-container">
            <div class="project-card" onclick="goToDetailsPage('ton_project')">
                <h2 class="card-title">TON Foundation Airdrop</h2>
                <p class="card-desc">Complete daily check-in & social tasks.</p>
                <div class="timer-box">
                    <span>Next Faucet: </span>
                    <span id="timer-ton" class="timer-text">04:59:59</span>
                </div>
            </div>
        </div>

        <div class="card-container">
            <div class="project-card" onclick="goToDetailsPage('monad_project')">
                <h2 class="card-title">Monad Testnet</h2>
                <p class="card-desc">Claim test tokens and swap.</p>
                <div class="timer-box">
                    <span>Next Faucet: </span>
                    <span id="timer-monad" class="timer-text">12:30:00</span>
                </div>
            </div>
        </div>
    </main>

    <div id="ton-connect" style="position: fixed; bottom: 20px; right: 20px; z-index: 999;"></div>

    <script src="../util/app.js"></script>
</body>
</html>
