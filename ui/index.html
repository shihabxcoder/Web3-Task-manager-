<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header>
        <h1>Airdrop Tasks</h1>
    </header>

    <main>
        <div class="card-container">
            <div class="project-card" onclick="goToDetailsPage('ton_project')">
                <h2 class="card-title">TON Foundation Airdrop</h2>
                <p class="card-desc">Complete daily check-in & social tasks.</p>
                <div class="timer-box">
                    <span>Next Faucet: </span>
                    <span id="timer-ton" class="timer-text">04:59:59</span>
                </div>
            </div>
        </div>

        <div class="card-container">
            <div class="project-card" onclick="goToDetailsPage('monad_project')">
                <h2 class="card-title">Monad Testnet</h2>
                <p class="card-desc">Claim test tokens and swap.</p>
                <div class="timer-box">
                    <span>Next Faucet: </span>
                    <span id="timer-monad" class="timer-text">12:30:00</span>
                </div>
            </div>
        </div>
    </main>

    <button class="floating-btn" onclick="toggleWalletSheet()">Connect Wallet</button>

    <div class="overlay" id="overlay" onclick="toggleWalletSheet()"></div>
    <div class="bottom-sheet" id="wallet-sheet">
        <h3 class="sheet-title">Select Wallet</h3>
        <div class="sheet-content">
            <button class="wallet-btn">TON Space</button>
            <button class="wallet-btn">Tonkeeper</button>
            <button class="wallet-btn">MyTonWallet</button>
            <button class="wallet-btn">OpenMask</button>
        </div>
    </div>

    <script src="../util/app.js"></script>
</body>
</html>
